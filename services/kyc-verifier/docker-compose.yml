version: "3.9"
services:
  kyc-verifier:
    build: .
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379/2
      - POSTGRES_URL=${POSTGRES_URL}
      - KYC_INTERNAL_API_KEY=${KYC_INTERNAL_API_KEY:-dev-kyc-key}
      - OLLAMA_URL=http://ollama:11434
      - VLM_MOCK_MODE=${VLM_MOCK_MODE:-true}
    depends_on:
      - kafka
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

