apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_admin: true
  admin_key:
    - name: admin
      key: ${APISIX_ADMIN_KEY:-edd1c9f034335f136f87ad84b625c8f1}
      role: admin

deployment:
  role: traditional
  role_traditional:
    config_provider: yaml

plugin_attr:
  prometheus:
    export_uri: /apisix/prometheus/metrics
    export_addr:
      ip: 0.0.0.0
      port: 9091

plugins:
  - jwt-auth
  - key-auth
  - rate-limiting
  - ip-restriction
  - cors
  - request-id
  - prometheus
  - opentelemetry
  - kafka-logger
  - http-logger
