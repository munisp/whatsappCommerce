version: "3.9"

# ─── WhatsApp Commerce Platform — Middleware Stack ────────────────────────────
# Services: Kafka, Zookeeper, Redis, Temporal, Dapr Placement, APISix, Keycloak
# Usage: docker compose -f docker-compose.middleware.yml up -d

services:
  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI ────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Temporal Server ─────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.25.2
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      temporal-db:
        condition: service_healthy
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    depends_on:
      - temporal

  # ── Dapr Placement Service ──────────────────────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.14.4
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  # ── Caddy Edge (TLS terminator + WAF) ─────────────────────────────────────
  caddy:
    build:
      context: ../caddy-edge
      dockerfile: Dockerfile
    image: whatsapp-commerce/caddy-edge:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    volumes:
      - ../caddy-edge/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy-edge/config/coraza.conf:/etc/caddy/coraza.conf:ro
      - ../caddy-edge/config/coraza:/etc/caddy/coraza:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./certs:/etc/caddy/certs:ro
    environment:
      DOMAIN: "${DOMAIN:-whatsapp-commerce.com}"
      ACME_EMAIL: "${ACME_EMAIL:-ops@whatsapp-commerce.com}"
    depends_on:
      - apisix
    networks:
      - middleware
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
  # ── APISix Gateway ──────────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.11.0-debian
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    environment:
      APISIX_STAND_ALONE: "true"
    volumes:
      - ./apisix-config:/usr/local/apisix/conf
    depends_on:
      - kafka
      - redis

  # ── KYC Verifier (Python) ───────────────────────────────────────────────────
  kyc-verifier:
    build:
      context: ../kyc-verifier
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379/2
      KYC_INTERNAL_API_KEY: ${KYC_INTERNAL_API_KEY:-dev-kyc-key}
      VLM_MOCK_MODE: ${VLM_MOCK_MODE:-true}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Keycloak Identity Provider ──────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_2026}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── OpenAppSec WAF ──────────────────────────────────────────────────────────
  openappsec-agent:
    image: ghcr.io/openappsec/agent:latest
    privileged: true
    network_mode: host
    environment:
      OPENAPPSEC_TOKEN: ${OPENAPPSEC_TOKEN:-}
      OPENAPPSEC_POLICY: /etc/openappsec/policy.yaml
    volumes:
      - ./openappsec-policy.yaml:/etc/openappsec/policy.yaml:ro
      - openappsec_data:/etc/cp/conf
    restart: unless-stopped

  # ── Permify Authorization Engine ────────────────────────────────────────────
  permify-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: permify
      POSTGRES_PASSWORD: permify
      POSTGRES_DB: permify
    volumes:
      - permify_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permify"]
      interval: 5s
      timeout: 5s
      retries: 10

  permify:
    image: ghcr.io/permify/permify:v0.9.6
    ports:
      - "3476:3476"
      - "3478:3478"
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://permify:permify@permify-db:5432/permify?sslmode=disable
      PERMIFY_DATABASE_AUTO_MIGRATE: "true"
      PERMIFY_LOG_LEVEL: info
    depends_on:
      permify-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3476/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-WaCommerce_2026!}
      plugins.security.disabled: "false"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_ADMIN_PASSWORD:-WaCommerce_2026!} https://localhost:9200/_cluster/health --insecure || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
    depends_on:
      - opensearch

  # ── Fluvio Streaming ────────────────────────────────────────────────────────
  fluvio-sc:
    image: infinyon/fluvio:0.11.11
    command: run sc --local
    ports:
      - "9003:9003"
    volumes:
      - fluvio_data:/var/lib/fluvio
    healthcheck:
      test: ["CMD-SHELL", "fluvio cluster status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  fluvio-spu:
    image: infinyon/fluvio:0.11.11
    command: run spu --id 5001 --sc-addr fluvio-sc:9003
    depends_on:
      fluvio-sc:
        condition: service_healthy
    volumes:
      - fluvio_spu_data:/var/lib/fluvio-spu


volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
  temporal_db_data:
  keycloak_db_data:
  openappsec_data:
  permify_db_data:
  opensearch_data:
  fluvio_data:
  fluvio_spu_data:
