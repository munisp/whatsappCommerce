# Coraza WAF configuration for WhatsApp Commerce Platform
# Based on OWASP Coraza recommended config

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyInMemoryLimit 131072
SecRequestBodyLimitAction Reject

# Logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/caddy/coraza-audit.log

# Paranoia level 2: balanced security vs false positives
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"
SecAction "id:900001,phase:1,nolog,pass,t:none,setvar:tx.enforced_paranoia_level=2"

# Allowed HTTP methods
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:'tx.allowed_methods=GET HEAD POST PUT PATCH DELETE OPTIONS'"

# WhatsApp webhook: allow large JSON payloads
SecRule REQUEST_URI "@beginsWith /api/webhooks/whatsapp" \
    "id:1000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=1"

# Allow Keycloak token endpoints without WAF interference
SecRule REQUEST_URI "@beginsWith /auth/realms" \
    "id:1001,phase:1,nolog,pass,t:none,ctl:ruleEngine=DetectionOnly"
