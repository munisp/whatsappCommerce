# APISIX configuration: enable mTLS for the admin and gateway ports
# Apply via: apisix admin API or config.yaml

# 1. In apisix/conf/config.yaml, add under apisix.ssl:
#    ssl:
#      enable: true
#      listen:
#        - port: 9443
#          enable_http2: true
#      ssl_trusted_certificate: /usr/local/apisix/certs/internal-ca.crt
#      ssl_verify_client: on   # Require client cert from Caddy

# 2. Create a global rule to verify the Caddy client cert CN:
# POST /apisix/admin/global_rules/1
---
id: "1"
plugins:
  # Verify that requests come from Caddy (CN=caddy-edge)
  # Uses the client cert injected by Caddy's mTLS transport
  request-validation:
    header_schema:
      type: object
      required:
        - x-forwarded-for
        - x-forwarded-proto
      properties:
        x-forwarded-for:
          type: string
        x-forwarded-proto:
          type: string
          enum: ["https"]

# 3. APISIX upstream for the webapp (behind Caddy → APISIX → webapp):
---
# POST /apisix/admin/upstreams/webapp
id: "webapp"
type: roundrobin
nodes:
  "webapp:3000": 1
scheme: http
keepalive_pool:
  size: 320
  idle_timeout: 60
  requests: 1000

# 4. APISIX route: forward all /api/trpc/* to webapp
---
# POST /apisix/admin/routes/trpc
id: "trpc"
uri: "/api/trpc/*"
upstream_id: "webapp"
plugins:
  # Rate limiting: 1000 req/min per consumer
  limit-req:
    rate: 1000
    burst: 100
    key: "consumer_name"
    rejected_code: 429
  # JWT validation via Keycloak JWKS
  openid-connect:
    client_id: "apisix-gateway"
    client_secret: "${KEYCLOAK_APISIX_CLIENT_SECRET}"
    discovery: "https://auth.whatsapp-commerce.example.com/auth/realms/whatsapp-commerce/.well-known/openid-configuration"
    introspection_endpoint_auth_method: "client_secret_post"
    bearer_only: true
    realm: "whatsapp-commerce"
