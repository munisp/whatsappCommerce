# WhatsApp Commerce Platform — Caddy Edge + Full Stack docker-compose
# Usage: docker compose -f services/caddy-edge/docker-compose.yml up -d
version: "3.9"

networks:
  wac-edge:
    driver: bridge
  wac-internal:
    driver: bridge
    internal: true  # No direct internet access for internal services

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
  keycloak_data:
  postgres_data:
  apisix_data:

services:
  # ── Caddy Edge ──────────────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wac-caddy-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
      - "2019:2019"     # Admin API + metrics (restrict in production!)
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/coraza.conf:/etc/caddy/coraza.conf:ro
      - ./certs:/etc/caddy/certs:ro
    environment:
      - ACME_AGREE=true
    networks:
      - wac-edge
      - wac-internal
    depends_on:
      - apisix
      - keycloak
      - webapp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── APISIX API Gateway ──────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: wac-apisix
    restart: unless-stopped
    volumes:
      - apisix_data:/usr/local/apisix/data
      - ../../middleware/apisix/conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./certs/internal-ca.crt:/usr/local/apisix/certs/internal-ca.crt:ro
    ports:
      - "9080:9080"   # HTTP (internal only — Caddy is the public entry point)
      - "9443:9443"   # HTTPS with mTLS
      - "9180:9180"   # Admin API (restrict in production!)
    networks:
      - wac-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/apisix/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    build:
      context: ../keycloak
      dockerfile: Dockerfile
    container_name: wac-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_2026}
      KC_HOSTNAME: auth.whatsapp-commerce.example.com
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak.key
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change_me_in_production}
      # WhatsApp OTP SPI configuration
      WAC_WHATSAPP_TOKEN: ${WAC_WHATSAPP_TOKEN:-}
      WAC_WHATSAPP_PHONE_ID: ${WAC_WHATSAPP_PHONE_ID:-}
      WAC_REDIS_HOST: redis
      WAC_REDIS_PORT: "6379"
    volumes:
      - ../keycloak/providers:/opt/keycloak/providers:ro
      - ../keycloak/config/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./certs/keycloak.crt:/opt/keycloak/certs/keycloak.crt:ro
      - ./certs/keycloak.key:/opt/keycloak/certs/keycloak.key:ro
    ports:
      - "8080:8080"   # HTTP (internal only)
      - "8443:8443"   # HTTPS
    networks:
      - wac-internal
    depends_on:
      - keycloak-db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Keycloak PostgreSQL ─────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: wac-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wac-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (OTP store for Keycloak SPI) ─────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: wac-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - wac-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Webapp (Node.js) ────────────────────────────────────────────────────────
  webapp:
    image: ghcr.io/munisp/whatsapp-commerce/webapp:${WAC_VERSION:-latest}
    container_name: wac-webapp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - wac-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
