apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: whatsapp-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka:9092"
    - name: consumerGroup
      value: "whatsapp-commerce"
    - name: authRequired
      value: "false"
    - name: maxMessageBytes
      value: "1048576"

