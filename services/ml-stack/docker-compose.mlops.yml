version: "3.9"

# MLOps Infrastructure Stack
# Run: docker-compose -f docker-compose.mlops.yml up -d

services:
  # ── MLflow Tracking Server ──────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres-mlflow:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
        --backend-store-uri postgresql://mlflow:mlflow@postgres-mlflow:5432/mlflow
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    depends_on:
      - postgres-mlflow
      - minio
    restart: unless-stopped

  # ── MLflow Postgres Backend ─────────────────────────────────────────────
  postgres-mlflow:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - mlflow-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── MinIO (S3-compatible artifact store) ───────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-07-04T14-25-45Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # ── Ray Head Node (distributed training) ───────────────────────────────
  ray-head:
    image: rayproject/ray:2.32.0-py311
    ports:
      - "8265:8265"   # Ray Dashboard
      - "10001:10001" # Ray Client
    environment:
      RAY_DISABLE_IMPORT_WARNING: "1"
    command: >
      ray start --head
        --port=6379
        --dashboard-host=0.0.0.0
        --dashboard-port=8265
        --block
    shm_size: "2g"
    restart: unless-stopped

  # ── Ray Worker Node ─────────────────────────────────────────────────────
  ray-worker:
    image: rayproject/ray:2.32.0-py311
    environment:
      RAY_DISABLE_IMPORT_WARNING: "1"
    command: >
      ray start
        --address=ray-head:6379
        --block
    depends_on:
      - ray-head
    shm_size: "2g"
    deploy:
      replicas: 2
    restart: unless-stopped

  # ── Keycloak (self-hosted auth) ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    command: start-dev
    depends_on:
      - postgres-keycloak
    restart: unless-stopped

  postgres-keycloak:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Ollama (local LLM) ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  mlflow-postgres-data:
  minio-data:
  keycloak-postgres-data:
  ollama-data:


