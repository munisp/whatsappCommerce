version: 2
updates:
  # npm / pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Python (KYC verifier)
  - package-ecosystem: "pip"
    directory: "/services/kyc-verifier"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Python (ML stack)
  - package-ecosystem: "pip"
    directory: "/services/ml-stack"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Go (event gateway)
  - package-ecosystem: "gomod"
    directory: "/services/event-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Rust (message processor)
  - package-ecosystem: "cargo"
    directory: "/services/message-processor"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/services/kyc-verifier"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/services/event-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

