name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  RUST_VERSION: "stable"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ─── Go Services ─────────────────────────────────────────────────────────
  go-lint-test:
    name: Go — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.60.0
      - name: Lint all Go services
        run: |
          for svc in services/gateway services/webhook-ingestor services/conversation-orchestrator services/commerce-engine services/payment-orchestrator; do
            echo "Linting $svc"
            cd $svc && golangci-lint run ./... && cd -
          done
      - name: Test all Go services
        run: |
          for svc in services/gateway services/webhook-ingestor services/conversation-orchestrator services/commerce-engine services/payment-orchestrator; do
            echo "Testing $svc"
            cd $svc && go test -race -coverprofile=coverage.out ./... && cd -
          done

  # ─── Rust Services ───────────────────────────────────────────────────────
  rust-lint-test:
    name: Rust — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Clippy
        run: cd rust && cargo clippy --all-targets --all-features -- -D warnings
      - name: Format check
        run: cd rust && cargo fmt --all -- --check
      - name: Test
        run: cd rust && cargo test --all

  # ─── Python AI Agent ─────────────────────────────────────────────────────
  python-lint-test:
    name: Python — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: cd ai-agent && pip install -r requirements.txt pytest ruff
      - name: Lint with ruff
        run: cd ai-agent && ruff check .
      - name: Run tests
        run: cd ai-agent && pytest tests/ -v --tb=short

  # ─── TypeScript Dashboard ─────────────────────────────────────────────────
  ts-lint-test:
    name: TypeScript — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm check
      - name: Run tests
        run: pnpm test

  # ─── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build All Images
    runs-on: ubuntu-latest
    needs: [go-lint-test, rust-lint-test, python-lint-test, ts-lint-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Go services
        run: |
          for svc in gateway webhook-ingestor conversation-orchestrator commerce-engine payment-orchestrator; do
            docker build -t whatsapp-commerce/$svc:${{ github.sha }} services/$svc/
          done
      - name: Build Rust services
        run: |
          for svc in event-processor ledger-bridge recon-worker; do
            docker build -t whatsapp-commerce/$svc:${{ github.sha }} rust/$svc/
          done
      - name: Build Python AI agent
        run: docker build -t whatsapp-commerce/ai-agent:${{ github.sha }} ai-agent/

